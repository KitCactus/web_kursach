spring.application.name=cafe

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/cafedb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.ru.ssau.cafe=DEBUG
logging.level.org.springframework.security=DEBUG

server.port=8080

# Static files configuration
# При запуске JAR можно переопределить: java -Dapp.uploads.dir=/absolute/path/uploads -jar cafe.jar
app.uploads.dir=${user.dir}/uploads
spring.web.resources.static-locations=file:${app.uploads.dir}/,classpath:/static/

# CORS allowed origins (dev and prod)
cors.allowed-origins=http://localhost:4200,http://localhost:8080